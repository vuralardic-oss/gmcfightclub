  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0d0d0d;font-family:'Barlow Condensed','Arial Narrow',sans-serif;color:#f0f0f0;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:#111;}
    ::-webkit-scrollbar-thumb{background:#c8102e;border-radius:3px;}
    .branch-card{background:#111;border:1px solid #222;border-radius:8px;padding:36px 28px;cursor:pointer;transition:all .22s;text-align:center;min-width:200px;max-width:260px;flex:1;}
    .branch-card:hover{border-color:#c8102e;background:#181818;transform:translateY(-3px);box-shadow:0 8px 32px rgba(200,16,46,.18);}
    .admin-pill{background:rgba(200,16,46,.15);border:1px solid rgba(200,16,46,.4);color:#c8102e;padding:3px 10px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:1px;}
    .ghost-btn{background:transparent;color:#777;border:1px solid #2a2a2a;padding:5px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;cursor:pointer;border-radius:2px;transition:all .2s;letter-spacing:.5px;}
    .ghost-btn:hover{border-color:#c8102e;color:#c8102e;}
    .cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .day-head{background:#111;padding:10px 4px;text-align:center;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid #c8102e;position:sticky;top:0;z-index:10;}
    .time-label{background:#0d0d0d;padding:0 8px;display:flex;align-items:center;justify-content:flex-end;border-right:1px solid #1a1a1a;}
    .slot{border:1px solid #181818;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,border-color .12s;position:relative;min-height:46px;}
    .slot.free{background:#0c1c0c;}
    .slot.free:hover{background:#162e16;border-color:#2a6e2a;}
    .slot.booked{background:#1c0808;cursor:default;}
    .slot.booked:hover{background:#220a0a;}
    .slot-free-dot{width:7px;height:7px;border-radius:50%;background:#2a8a2a;transition:transform .15s;}
    .slot.free:hover .slot-free-dot{transform:scale(1.6);}
    .slot-booked-inner{display:flex;flex-direction:column;align-items:center;gap:1px;padding:0 4px;width:100%;}
    .slot-booked-name{font-size:10px;color:#c8102e;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);}
    .modal-box{background:#161616;border:1px solid #2a2a2a;border-top:3px solid #c8102e;padding:30px;width:400px;max-width:95vw;border-radius:4px;}
    .book-btn{background:#c8102e;color:#fff;border:none;padding:10px 24px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s;}
    .book-btn:hover{background:#e8192e;}
    input[type=text],input[type=password]{width:100%;background:#111;border:1px solid #333;color:#f0f0f0;padding:11px 14px;font-family:'Barlow',sans-serif;font-size:15px;border-radius:2px;outline:none;transition:border-color .2s;}
    input:focus{border-color:#c8102e;}
    lbl{font-family:'Barlow',sans-serif;font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:7px;}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:11px 26px;border-radius:4px;font-family:'Barlow',sans-serif;font-size:14px;z-index:200;animation:fadeUp .3s ease;white-space:nowrap;}
    .toast.ok{background:#0e2a10;border:1px solid #2a6e2a;color:#6ddd6d;}
    @keyframes fadeUp{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}
    @media(max-width:600px){.modal-box{padding:22px;}}
  </style>

  appId: "1:588694512340:web:aea1bc3eb71f8090d51141"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function dbKey(b,c){return b.replace(/ /g,'_')+"/"+c.replace(/ /g,'_');}

function saveData(b,c,d){
  db.ref("bookings/"+dbKey(b,c)).set(d);
}
function subscribeData(b,c,cb){
  db.ref("bookings/"+dbKey(b,c)).on('value', snap=>{
    cb(snap.val()||{});
  });
  return ()=>db.ref("bookings/"+dbKey(b,c)).off();
}
function endTime(t){const n=parseInt(t)+1;return(n===24?"00":String(n).padStart(2,"0"))+":00";}

  return(
    <div style={{minHeight:"100vh",background:"#0d0d0d",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{position:"relative",marginBottom:26}}>
        <div style={{width:112,height:112,borderRadius:"50%",overflow:"hidden",border:"2px solid #1e1e1e"}}>
          <img src={"data:image/jpeg;base64,"+LOGO_B64} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="GMC"/>
        </div>
        <div style={{position:"absolute",bottom:-6,right:-6,background:"#c8102e",borderRadius:"50%",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🥊</div>
      </div>
      <div style={{fontWeight:900,fontSize:30,letterSpacing:4,textTransform:"uppercase",lineHeight:1,textAlign:"center"}}>

function Schedule({branch,coach,onBack}){
  const [bookings,setBookings]=useState({});
  const [loading,setLoading]=useState(true);
  const [mode,setMode]=useState("user");
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [modal,setModal]=useState(null);
  const [nameInput,setNameInput]=useState("");
  const [nameError,setNameError]=useState("");
  const [toast,setToast]=useState(null);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),3000);}
  function save(u){saveData(branch,coach,u);}

  useEffect(()=>{
    setLoading(true);
    const unsub = subscribeData(branch,coach,(data)=>{
      setBookings(data);
      setLoading(false);
    });
    return unsub;
  },[branch,coach]);
  function key(d,t){return d+"|"+t;}

  function clickSlot(day,time){
    const k=key(day,time);
    const booked=bookings[k];
    if(booked){
      if(mode==="admin") setModal({day,time,adminView:true,name:booked});
      return;
    }
    setModal({day,time});
    setNameInput("");
    setNameError("");
  }

  function confirmBook(){
    if(!nameInput.trim()){setNameError("Lütfen adınızı girin.");return;}
    const k=key(modal.day,modal.time);
    if(bookings[k]){setNameError("Bu saat dolu!");return;}
    save({...bookings,[k]:nameInput.trim()});
    setModal(null);
    showToast(`✅ ${modal.day} ${modal.time} rezervasyonu alındı!`);
  }

  function cancelBooking(day,time){
    const u={...bookings};
    delete u[key(day,time)];
    save(u);
    setModal(null);
    showToast("🗑️ Rezervasyon iptal edildi.");
  }

  function loginAdmin(){
    if(pinInput===ADMIN_PIN){setMode("admin");setShowPin(false);setPinInput("");setPinError(false);}
    else setPinError(true);
  }

  const booked=Object.keys(bookings).length;
  const total=DAYS_FULL.length*TIMES.length;
  const cols=`56px repeat(${DAYS_FULL.length},1fr)`;

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0d0d0d",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <img src={"data:image/jpeg;base64,"+LOGO_B64} style={{width:60,height:60,borderRadius:"50%",objectFit:"cover",border:"2px solid #c8102e",animation:"pulse 1.2s ease-in-out infinite"}} alt="GMC"/>
      <div style={{color:"#777",fontSize:13,letterSpacing:2,fontWeight:600}}>YÜKLENIYOR...</div>
      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}`}</style>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#0d0d0d"}}>
      {/* Header */}
      <header style={{borderBottom:"1px solid #1a1a1a",padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:54,position:"sticky",top:0,background:"rgba(13,13,13,.97)",backdropFilter:"blur(8px)",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={"data:image/jpeg;base64,"+LOGO_B64} style={{width:34,height:34,borderRadius:"50%",objectFit:"cover",border:"1px solid #222"}} alt="GMC"/>
          <div>
            <div style={{fontWeight:900,fontSize:16,letterSpacing:2,textTransform:"uppercase",lineHeight:1}}>
              <span style={{color:"#c8102e"}}>{branch.split(" ")[0]}</span> {branch.split(" ").slice(1).join(" ")}
            </div>
            <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow'",marginTop:1}}>
              👤 {coach} &nbsp;·&nbsp;
              <button onClick={onBack} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:10,fontFamily:"'Barlow'",letterSpacing:1.5,padding:0,textTransform:"uppercase"}}>← Hoca Değiştir</button>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {mode==="admin"&&<span className="admin-pill">ADMİN</span>}
          {mode==="user"
            ?<button className="ghost-btn" onClick={()=>setShowPin(true)}>🔐 Admin</button>
            :<button className="ghost-btn" onClick={()=>setMode("user")}>Çıkış</button>
          }
        </div>
      </header>

      {/* Stats bar */}
      <div style={{background:"#0f0f0f",borderBottom:"1px solid #1a1a1a",padding:"8px 14px",display:"flex",gap:20,alignItems:"center"}}>
        <div style={{display:"flex",gap:16,alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#2a8a2a"}}></div>
            <span style={{fontFamily:"'Barlow'",fontSize:12,color:"#555"}}>{total-booked} Müsait</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#c8102e"}}></div>
            <span style={{fontFamily:"'Barlow'",fontSize:12,color:"#555"}}>{booked} Dolu</span>
          </div>
        </div>
        <div style={{marginLeft:"auto",fontFamily:"'Barlow'",fontSize:11,color:"#333",letterSpacing:1}}>
          Hf. {booked}/{total}
        </div>
      </div>

      {/* Calendar */}
      <div style={{padding:"12px 10px 60px"}}>
        <div className="cal-wrap">
          <div style={{display:"grid",gridTemplateColumns:cols,minWidth:520}}>

            {/* Header */}
            <div style={{background:"#0d0d0d",borderBottom:"2px solid #c8102e",minHeight:46}}></div>
            {DAYS_FULL.map((d,i)=>(
              <div key={d} className="day-head">
                <div style={{color:"#c8102e",fontSize:14}}>{DAYS_SHORT[i]}</div>
                <div style={{fontSize:9,color:"#333",fontFamily:"'Barlow'",marginTop:1,letterSpacing:.5}}>{d.slice(0,3).toUpperCase()}</div>
              </div>
            ))}

            {/* Rows */}
            {TIMES.map(time=>[
              <div key={"t"+time} className="time-label">
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#555",fontWeight:700,lineHeight:1}}>{time}</div>
                  <div style={{fontSize:9,color:"#2a2a2a",marginTop:1}}>–{endTime(time)}</div>
                </div>
              </div>,
              ...DAYS_FULL.map(day=>{
                const k=key(day,time);
                const b=bookings[k];
                return(
                  <div key={day+time} className={`slot ${b?"booked":"free"}`}
                    onClick={()=>clickSlot(day,time)}
                    title={b?(mode==="admin"?b:"Dolu"):"Rezervasyon için tıkla"}>
                    {b?(
                      <div className="slot-booked-inner">
                        <div style={{fontSize:12}}>🔴</div>
                        {mode==="admin"&&<div className="slot-booked-name">{b}</div>}
                      </div>
                    ):(
                      <div className="slot-free-dot"></div>
                    )}
                  </div>
                );
              })
            ])}
          </div>
        </div>
      </div>

      {/* Book Modal */}
      {modal&&!modal.adminView&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#555",marginBottom:4}}>Özel Ders</div>
            <div style={{fontWeight:900,fontSize:24,color:"#c8102e",marginBottom:2}}>{modal.day}</div>
            <div style={{fontWeight:900,fontSize:40,lineHeight:1,marginBottom:2}}>{modal.time}</div>
            <div style={{fontFamily:"'Barlow'",fontSize:13,color:"#444",marginBottom:22}}>{modal.time} – {endTime(modal.time)} · 1 Saatlik Özel Ders</div>
            <lbl>Ad Soyad</lbl>
            <input type="text" placeholder="Ahmet Yılmaz"
              value={nameInput}
              onChange={e=>{setNameInput(e.target.value);setNameError("");}}
              onKeyDown={e=>e.key==="Enter"&&confirmBook()} autoFocus/>
            {nameError&&<div style={{color:"#c8102e",fontSize:13,marginTop:8,fontFamily:"'Barlow'"}}>{nameError}</div>}
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="book-btn" onClick={confirmBook} style={{flex:1}}>Rezervasyon Yap</button>
              <button className="ghost-btn" onClick={()=>setModal(null)}>İptal</button>
            </div>
          </div>
        </div>
      )}

      {/* Admin detail modal */}
      {modal&&modal.adminView&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:700,fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#555",marginBottom:4}}>Rezervasyon</div>
            <div style={{fontWeight:900,fontSize:24,color:"#c8102e",marginBottom:2}}>{modal.day}</div>
            <div style={{fontWeight:900,fontSize:40,lineHeight:1,marginBottom:16}}>{modal.time}</div>
            <div style={{background:"#111",border:"1px solid #222",borderRadius:4,padding:"14px 16px",marginBottom:20}}>
              <lbl>Kayıtlı Kişi</lbl>
              <div style={{fontWeight:700,fontSize:20}}>{modal.name}</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="book-btn" style={{background:"#222",color:"#888",flex:1}} onClick={()=>setModal(null)}>Kapat</button>
              <button className="book-btn" style={{background:"#6e0a0a",flex:1}} onClick={()=>cancelBooking(modal.day,modal.time)}>🗑️ İptal Et</button>
            </div>
          </div>
        </div>
      )}

      {/* PIN Modal */}
      {showPin&&(
        <div className="modal-overlay" onClick={()=>{setShowPin(false);setPinInput("");setPinError(false);}}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:20,textTransform:"uppercase",letterSpacing:2,marginBottom:20}}>Admin Girişi</div>
            <lbl>PIN Kodu</lbl>
            <input type="password" placeholder="••••" value={pinInput}
              onChange={e=>{setPinInput(e.target.value);setPinError(false);}}
              onKeyDown={e=>e.key==="Enter"&&loginAdmin()} autoFocus/>
            {pinError&&<div style={{color:"#c8102e",fontSize:13,marginTop:8,fontFamily:"'Barlow'"}}>Hatalı PIN.</div>}
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="book-btn" onClick={loginAdmin} style={{flex:1}}>Giriş</button>
              <button className="ghost-btn" onClick={()=>{setShowPin(false);setPinInput("");setPinError(false);}}>İptal</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast ok">{toast}</div>}
    </div>
  );
}

function App(){
  const [branch,setBranch]=useState(null);
  const [coach,setCoach]=useState(null);
  if(!branch) return <BranchScreen onSelect={setBranch}/>;
  if(!coach)  return <CoachScreen branch={branch} onSelect={setCoach} onBack={()=>setBranch(null)}/>;
  return <Schedule branch={branch} coach={coach} onBack={()=>setCoach(null)}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
